<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Test Cảm Biến RFID E-Ra</title>
    <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0;
        }
        .box { 
            background: #2a2a2a; padding: 40px; border-radius: 15px; text-align: center; 
            border: 2px solid #00ffcc; box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
            width: 80%; max-width: 400px;
        }
        h2 { margin-top: 0; color: #00ffcc; letter-spacing: 1px; }
        .uid-display { 
            font-size: 36px; font-weight: bold; color: #FF5500; min-height: 50px; 
            margin: 20px 0; padding: 15px; background: #111; border-radius: 8px; 
            font-family: monospace; letter-spacing: 3px; transition: 0.3s;
        }
        .status { font-size: 14px; color: #aaa; font-style: italic; }
        .log-box {
            margin-top: 20px; font-size: 12px; color: #666; background: #111;
            padding: 10px; border-radius: 5px; text-align: left;
        }
    </style>
</head>
<body>

    <div class="box">
        <h2>BỘ THU UID KIỂM THỬ</h2>
        <div class="status" id="statusText">Đang khởi tạo kết nối E-Ra...</div>
        
        <div class="uid-display" id="uidDisplay">---</div>
        
        <div class="status">Hãy quét thẻ RFID vào cảm biến</div>
        <div class="log-box" id="logBox">Log hệ thống sẽ hiện ở đây...</div>
    </div>

    <script>
        const eraWidget = new EraWidget();
        let targetConfig = null;
        const statusText = document.getElementById('statusText');
        const uidDisplay = document.getElementById('uidDisplay');
        const logBox = document.getElementById('logBox');

        function addLog(msg) {
            logBox.textContent = msg;
            console.log(msg);
        }

        eraWidget.init({
            onConfiguration: (conf) => {
                statusText.textContent = "✅ Đã liên kết cấu hình E-Ra!";
                statusText.style.color = "#00ffcc";
                
                // Thuật toán quét tìm chân cấu hình
                if (conf.realtime_configs && conf.realtime_configs.length > 0) {
                    targetConfig = conf.realtime_configs[0];
                    addLog("Đã ghim cấu hình dạng: Giá trị hiện thời (Realtime)");
                } else if (conf.actions && conf.actions.length > 0) {
                    targetConfig = conf.actions[0];
                    addLog("Đã ghim cấu hình dạng: Hành động (Action)");
                } else {
                    statusText.textContent = "⚠️ Lỗi: Chưa thêm cấu hình V4 vào Widget!";
                    statusText.style.color = "#ff5500";
                    addLog("Vui lòng vào cài đặt Widget và thêm chân V4");
                }
            },
            
            onValues: (values) => {
                // Nếu nhận được dữ liệu
                if (targetConfig && values[targetConfig.id]) {
                    const receivedUID = values[targetConfig.id].value;
                    
                    if (receivedUID !== undefined && receivedUID !== null && receivedUID !== "") {
                        uidDisplay.textContent = receivedUID;
                        addLog("Đã nhận UID mới: " + receivedUID);
                        
                        // Hiệu ứng nháy màu báo hiệu nhận thẻ
                        uidDisplay.style.color = "#ffffff";
                        uidDisplay.style.backgroundColor = "#00ffcc";
                        setTimeout(() => {
                            uidDisplay.style.color = "#FF5500";
                            uidDisplay.style.backgroundColor = "#111";
                        }, 400);
                    }
                }
            }
        });
    </script>
</body>
</html>
